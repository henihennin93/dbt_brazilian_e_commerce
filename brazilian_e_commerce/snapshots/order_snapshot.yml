snapshots:
  - name: orders_snapshot
    relation: ref('stg_orders')
    config:
      schema: snapshots
      strategy: check
      unique_key: order_id
      check_cols:
        - order_status
        - order_purchase_timestamp
        - order_approved_at
        - order_delivered_carrier_date
        - order_delivered_customer_date
        - order_estimated_delivery_date